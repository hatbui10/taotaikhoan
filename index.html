<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tạo file các tài khoản</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --bg-deep: #050505;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Quy tắc 3 mép: Trên 30px, 2 bên 3px */
            margin: 30px 3px 0 3px; 
            padding-bottom: 20px;
        }

        .container {
            width: 100%;
            box-sizing: border-box;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--neon-blue);
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            height: 45px; /* Chiều cao tối ưu cho cảm ứng */
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            padding: 0 12px;
            box-sizing: border-box;
            font-size: 16px; /* Tránh tự động zoom trên iPhone */
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px var(--neon-blue);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 2fr 1.5fr;
            gap: 8px;
            margin: 15px 0;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            active-transform: scale(0.95);
        }

        .btn-create {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .btn-export {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 0, 234, 0.3);
        }

        .btn-clear {
            background: #222;
            color: #888;
            grid-column: span 2;
            height: 40px;
            margin-top: 5px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: #000;
            color: #00ff41;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            box-sizing: border-box;
            resize: none;
            margin-top: 10px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="input-group">
            <label>Ứng dụng</label>
            <input type="text" id="appName" placeholder="Tên App..." autocomplete="off">
        </div>
        <div class="input-group">
            <label>ID / Tài khoản</label>
            <input type="text" id="appId" placeholder="ID..." autocomplete="off">
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="text" id="appPass" placeholder="Mật khẩu..." autocomplete="off">
        </div>

        <div class="btn-grid">
            <button class="btn-create" onclick="createData()">Tạo kết quả</button>
            <button class="btn-export" onclick="exportTxt()">Xuất TXT</button>
            <button class="btn-clear" onclick="clearData()">Xóa toàn bộ dữ liệu</button>
        </div>

        <textarea id="resultArea" readonly placeholder="Kết quả sẽ hiện ở đây..."></textarea>
    </div>

    <script>
        let count = 1;

        // Khôi phục dữ liệu
        window.onload = () => {
            const savedData = localStorage.getItem('mobile_app_content');
            const savedCount = localStorage.getItem('mobile_app_count');
            if (savedData) document.getElementById('resultArea').value = savedData;
            if (savedCount) count = parseInt(savedCount);
        };

        function createData() {
            const name = document.getElementById('appName').value.trim();
            const id = document.getElementById('appId').value.trim();
            const pass = document.getElementById('appPass').value.trim();

            if (!name || !id || !pass) {
                alert("Hãy nhập đủ 3 thông tin!");
                return;
            }

            const area = document.getElementById('resultArea');
            const entry = `${count}. ${name} | ID: ${id} | Pass: ${pass}\n`;
            
            area.value += entry;
            count++;

            // Lưu LocalStorage
            localStorage.setItem('mobile_app_content', area.value);
            localStorage.setItem('mobile_app_count', count);

            // Xóa input & focus lại ô đầu
            document.getElementById('appName').value = '';
            document.getElementById('appId').value = '';
            document.getElementById('appPass').value = '';
            document.getElementById('appName').focus();
            
            // Tự động cuộn xuống cuối textarea
            area.scrollTop = area.scrollHeight;
        }

        function exportTxt() {
            const content = document.getElementById('resultArea').value;
            if (!content) return alert("Chưa có dữ liệu!");

            const blob = new Blob([content], { type: 'text/plain' });
            const link = document.createElement('a');
            const suffix = Math.floor(1000 + Math.random() * 9000);

            link.href = URL.createObjectURL(blob);
            link.download = `Apps_${suffix}.txt`;
            link.click();
        }

        function clearData() {
            if (confirm("Xóa sạch danh sách và STT?")) {
                localStorage.clear();
                document.getElementById('resultArea').value = '';
                count = 1;
            }
        }
    </script>
</body>
</html>
