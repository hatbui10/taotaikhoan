<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý tài khoản - Chống lỗi Font</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-gold: #ffcc00;
            --bg-deep: #050505;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 20px 5px;
            padding-bottom: 20px;
        }

        .container {
            width: 100%;
            box-sizing: border-box;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .auth-box {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--neon-gold);
            margin-bottom: 20px;
            text-align: center;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--neon-blue);
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            height: 45px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            padding: 0 12px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 10px;
            outline: none;
        }

        #accessPass {
            border-color: var(--neon-gold);
            text-align: center;
            letter-spacing: 5px;
        }

        .btn-auth {
            background: var(--neon-gold);
            color: #000;
            width: 100%;
            height: 45px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        button { cursor: pointer; transition: 0.2s; border: none; font-weight: bold; border-radius: 8px; }
        button:active { transform: scale(0.95); }

        .btn-create { background: var(--neon-blue); color: #000; height: 50px; }
        .btn-export { background: var(--neon-pink); color: #fff; height: 50px; }
        .btn-clear { background: #222; color: #888; grid-column: span 2; height: 35px; margin-top: 5px;}

        textarea {
            width: 100%;
            height: 300px;
            background: #000;
            color: #00ff41;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            margin-top: 15px;
            box-sizing: border-box;
            opacity: 0.1;
            pointer-events: none;
        }

        .unlocked textarea {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="container" id="appContainer">
        <div class="auth-box" id="lockScreen">
            <label style="color: var(--neon-gold)">NHẬP MẬT KHẨU ĐỂ XEM DỮ LIỆU</label>
            <input type="password" id="accessPass" placeholder="****">
            <button class="btn-auth" onclick="unlock()">MỞ KHÓA</button>
        </div>

        <div id="mainUI">
            <div class="input-group">
                <label>Tên Ứng dụng</label>
                <input type="text" id="appName" placeholder="Ví dụ: Facebook, Gmail...">
            </div>
            <div class="input-group">
                <label>ID / Tài khoản</label>
                <input type="text" id="appId" placeholder="Tên đăng nhập...">
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="text" id="appPass" placeholder="Mật khẩu...">
            </div>

            <div class="btn-grid">
                <button class="btn-create" onclick="add()">THÊM MỚI</button>
                <button class="btn-export" onclick="exportFile()">XUẤT FILE .TXT</button>
                <button class="btn-clear" onclick="clearAll()">XÓA TẤT CẢ</button>
            </div>

            <textarea id="resultArea" readonly placeholder="Dữ liệu sẽ hiện sau khi nhập mật khẩu..."></textarea>
        </div>
    </div>

    <script>
        const PASS = 'Hatbuivohinh Trrldtb Tcbcqtn Tmtltgbt Ltgcdmv 9420,./'; // Đổi mật khẩu tại đây
        let count = 1;
        const area = document.getElementById('resultArea');

        function unlock() {
            const input = document.getElementById('accessPass').value;
            if (input === PASS) {
                document.getElementById('appContainer').classList.add('unlocked');
                document.getElementById('lockScreen').style.display = 'none';
                area.readOnly = false;

                // Lấy dữ liệu cũ từ Key của bạn
                const oldData = localStorage.getItem('mobile_app_content');
                const oldCount = localStorage.getItem('mobile_app_count');
                
                if (oldData) area.value = oldData;
                if (oldCount) count = parseInt(oldCount);
                
                alert("Mở khóa thành công!");
            } else {
                alert("Mật khẩu sai!");
            }
        }

        function add() {
            const name = document.getElementById('appName').value.trim();
            const id = document.getElementById('appId').value.trim();
            const pass = document.getElementById('appPass').value.trim();

            if(!name || !id || !pass) return alert("Vui lòng nhập đủ thông tin!");

            const entry = `${count}. APP: ${name}\n   ID: ${id}\n   PASS: ${pass}\n----------------------------------------\n`;
            area.value += entry;
            count++;

            localStorage.setItem('mobile_app_content', area.value);
            localStorage.setItem('mobile_app_count', count);
            
            // Xóa input sau khi thêm
            document.getElementById('appName').value = '';
            document.getElementById('appId').value = '';
            document.getElementById('appPass').value = '';
        }

        area.addEventListener('input', () => {
            localStorage.setItem('mobile_app_content', area.value);
        });

        function exportFile() {
            if(!area.value) return alert("Không có dữ liệu!");

            // GIẢI PHÁP SỬA LỖI FONT: Thêm BOM (Byte Order Mark) cho UTF-8
            const BOM = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const content = area.value;
            const blob = new Blob([BOM, content], { type: 'text/plain;charset=utf-8' });
            
            const a = document.createElement('a');
            const date = new Date().toLocaleDateString('vi-VN').replace(/\//g, '-');
            a.href = URL.createObjectURL(blob);
            a.download = `Tai_Khoan_Backup_${date}.txt`;
            a.click();
        }

        function clearAll() {
            if(confirm("Bạn có chắc chắn muốn xóa SẠCH dữ liệu không?")) {
                localStorage.removeItem('mobile_app_content');
                localStorage.removeItem('mobile_app_count');
                area.value = '';
                count = 1;
            }
        }
    </script>
</body>
</html>
